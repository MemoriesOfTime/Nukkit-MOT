name: Java CI with Gradle

on:
  push:
    branches: [ feature/java-25 ]
  pull_request:
    branches: [ feature/java-25 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Nukkit-MOT
          path: target/*.jar
          if-no-files-found: error
          retention-days: 60

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Format ChangeLog
        id: get-changelog
        if: success() && github.event_name == 'push' && github.repository == 'MemoriesOfTime/Nukkit-MOT' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/java-25')
        run: |
          COMMIT_MSG=$(echo '${{ github.event.commits[0].message }}' | head -n 1)
          echo "changelog=${COMMIT_MSG}" >> $GITHUB_OUTPUT

      - name: Get Time
        id: time
        uses: nanzm/get-time-action@v1.1
        if: github.repository == 'MemoriesOfTime/Nukkit-MOT' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/java-25')
        with:
          timeZone: 8
          format: 'YYYY/MM/DD-HH:mm:ss'

      - name: Update MineBBS information
        uses: fjogeleit/http-request-action@v1
        if: success() && github.event_name == 'push' && github.repository == 'MemoriesOfTime/Nukkit-MOT' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/java-25')
        with:
          url: 'https://api.minebbs.com/api/openapi/v1/resources/5934/update'
          method: 'POST'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.MINEBBS_API_KEY }}"}'
          contentType: 'application/json'
          data: '{"title": "${{ github.ref_name }}-${{ steps.vars.outputs.sha_short }}", "description": "${{ steps.get-changelog.outputs.changelog }}", "new_version": "${{ steps.time.outputs.time }}", "file_url": "https://motci.cn/job/Nukkit-MOT/"}'
          escapeData: 'true'
          preventFailureOnNoResponse: 'true'
          ignoreStatusCodes: '400,404,401,403,500,502,503,504'